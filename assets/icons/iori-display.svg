<?xml version="1.0" encoding="UTF-8"?>
<!-- IORI — display / large scale (96x96 viewBox, typical render 64–256px).
     More text lines and proportionally thicker strokes to hold up at size.
     Paper body fill driven by --iori-bg CSS variable; defaults to the
     dark hero/nav background. Override with style="--iori-bg:#F1ECE2"
     when placed on a cream / light surface. -->
<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
    <style>svg { --iori-bg: #14141A; }</style>
    <g stroke="currentColor" stroke-width="2" fill="var(--iori-bg, #14141A)"
       stroke-linecap="round" stroke-linejoin="round">
        <rect x="34" y="14" width="44" height="60" rx="2"/>
        <rect x="24" y="22" width="44" height="60" rx="2"/>
        <rect x="14" y="30" width="44" height="60" rx="2"/>
    </g>
    <g stroke="currentColor" stroke-width="1.3" opacity="0.55" stroke-linecap="round">
        <line x1="20" y1="42" x2="44" y2="42"/>
        <line x1="20" y1="50" x2="52" y2="50"/>
        <line x1="20" y1="58" x2="48" y2="58"/>
        <line x1="20" y1="66" x2="50" y2="66"/>
        <line x1="20" y1="74" x2="42" y2="74"/>
        <line x1="20" y1="82" x2="46" y2="82"/>
    </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 736 390" role="img" aria-labelledby="title desc">
  <title id="title">Claude Opus 4.8 D1 score by harness</title>
  <desc id="desc">Marvin scores 81.1 percent, Biomni 41.5 percent, Claude Science 47.2 percent, Claude Code 43.4 percent, and Open Source Alternative 24.5 percent. The displayed axis begins at 20 percent.</desc>
  <style>
    text { fill: #fff; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 400; }
    .label { text-anchor: end; }.value { text-anchor: start; }.strong { font-weight: 500; }
    .ticks text { fill: #8b8b8b; text-anchor: middle; }.grid line { stroke: #2b2b2b; stroke-width: 1; }
  </style>
  <rect width="736" height="390" fill="#181818"/>
  <g class="grid" aria-hidden="true">
    <line x1="210" y1="20" x2="210" y2="346"/><line x1="327.5" y1="20" x2="327.5" y2="346"/>
    <line x1="445" y1="20" x2="445" y2="346"/><line x1="562.5" y1="20" x2="562.5" y2="346"/>
    <line x1="680" y1="20" x2="680" y2="346"/>
  </g>
  <g>
    <text class="label strong" x="198" y="57">Marvin</text><rect x="210" y="34" width="359" height="34" rx="3" fill="#99c1fb"/><text class="value strong" x="577" y="57">81.1%</text>
    <text class="label" x="198" y="117">Biomni</text><rect x="210" y="94" width="126.3" height="34" rx="3" fill="#e2a061"/><text class="value" x="344" y="117">41.5%</text>
    <text class="label" x="198" y="177">Claude Science</text><rect x="210" y="154" width="159.8" height="34" rx="3" fill="#92d290"/><text class="value" x="378" y="177">47.2%</text>
    <text class="label" x="198" y="237">Claude Code</text><rect x="210" y="214" width="137.5" height="34" rx="3" fill="#de96bf"/><text class="value" x="356" y="237">43.4%</text>
    <text class="label" x="198" y="297">Open Source Alternative</text><rect x="210" y="274" width="26.4" height="34" rx="3" fill="#a793ea"/><text class="value" x="245" y="297">24.5%</text>
  </g>
  <g class="ticks" aria-hidden="true">
    <text x="210" y="370">20%</text><text x="327.5" y="370">40%</text><text x="445" y="370">60%</text><text x="562.5" y="370">80%</text><text x="680" y="370">100%</text>
  </g>
</svg>

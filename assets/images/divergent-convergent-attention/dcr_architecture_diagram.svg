<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --p: #e8e8e8; --s: #a0a0a0; --t: #707070; --bg2: #2a2a2a; --b: #404040;
  --font-sans: system-ui, -apple-system, sans-serif;
}
text { font-family: var(--font-sans); }
.th { font-size: 14px; font-weight: 500; fill: var(--p); }
.ts { font-size: 12px; font-weight: 400; fill: var(--s); }
.t { font-size: 14px; font-weight: 400; fill: var(--p); }

.c-gray rect, .c-gray circle { fill: #444441; stroke: #B4B2A9; }
.c-gray .th { fill: #D3D1C7; } .c-gray .ts { fill: #B4B2A9; }
.c-coral rect { fill: #712B13; stroke: #F0997B; }
.c-coral .th { fill: #F5C4B3; } .c-coral .ts { fill: #F0997B; }
.c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
.c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
.c-blue rect { fill: #0C447C; stroke: #85B7EB; }
.c-blue .th { fill: #B5D4F4; } .c-blue .ts { fill: #85B7EB; }
.c-amber rect { fill: #633806; stroke: #FAC775; }
.c-amber .th { fill: #FAEEDA; } .c-amber .ts { fill: #FAC775; }

.arr { stroke: var(--s); stroke-width: 1.5; }
.leader { stroke: var(--t); stroke-width: 0.5; stroke-dasharray: 3 3; }
</style>

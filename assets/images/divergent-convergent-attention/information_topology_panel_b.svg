<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --p: #1a1a1a; --s: #6b6b6b; --t: #9a9a9a; --bg2: #f5f5f5; --b: #d4d4d4;
  --font-sans: system-ui, -apple-system, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root { --p: #e8e8e8; --s: #a0a0a0; --t: #707070; --bg2: #2a2a2a; --b: #404040; }
}
text { font-family: var(--font-sans); }
.th { font-size: 14px; font-weight: 500; fill: var(--p); }
.t { font-size: 14px; font-weight: 400; fill: var(--p); }
.ts { font-size: 12px; font-weight: 400; fill: var(--s); }

.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .th { fill: #085041; }
.c-gray rect { fill: #F1EFE8; stroke: #B4B2A9; }
.c-gray .t { fill: #444441; }
.c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
.c-blue .th { fill: #0C447C; }

@media (prefers-color-scheme: dark) {
  .c-teal rect { fill: #085041; stroke: #5DCAA5; }
  .c-teal .th { fill: #9FE1CB; }
  .c-gray rect { fill: #444441; stroke: #B4B2A9; }
  .c-gray .t { fill: #D3D1C7; }
  .c-blue rect { fill: #0C447C; stroke: #85B7EB; }
  .c-blue .th { fill: #B5D4F4; }
}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="155" y="24" text-anchor="middle" fill="#085041" style="font-size:17px">Distributed topology</text>
<path d="M244 12 L254 24 L268 4" fill="none" stroke="#0F6E56" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

<text class="th" x="510" y="24" text-anchor="middle" fill="#791F1F" style="font-size:17px">Linear topology</text>
<line x1="588" y1="8" x2="602" y2="26" stroke="#A32D2D" stroke-width="3" stroke-linecap="round"/>
<line x1="602" y1="8" x2="588" y2="26" stroke="#A32D2D" stroke-width="3" stroke-linecap="round"/>

<line x1="340" y1="6" x2="340" y2="314" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="5 5"/>

<g class="c-teal"><rect x="55" y="50" width="200" height="34" rx="4" stroke-width="1.5"/>
<text class="th" x="155" y="67" text-anchor="middle" dominant-baseline="central">Doc A (gold)</text></g>


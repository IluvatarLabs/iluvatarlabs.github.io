<text class="t" x="155" y="107" text-anchor="middle" dominant-baseline="central" opacity="0.55">Doc B (distractor)</text></g>

<g class="c-gray"><rect x="55" y="130" width="200" height="34" rx="4" stroke-width="0.5"/>
<text class="t" x="155" y="147" text-anchor="middle" dominant-baseline="central" opacity="0.55">Doc C (distractor)</text></g>

<g class="c-teal"><rect x="55" y="170" width="200" height="34" rx="4" stroke-width="1.5"/>
<text class="th" x="155" y="187" text-anchor="middle" dominant-baseline="central">Doc D (gold)</text></g>

<g class="c-gray"><rect x="55" y="210" width="200" height="34" rx="4" stroke-width="0.5"/>
<text class="t" x="155" y="227" text-anchor="middle" dominant-baseline="central" opacity="0.55">Doc E (distractor)</text></g>

<path d="M255 67 L280 67 L280 278 L205 278" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M55 187 L30 187 L30 278 L105 278" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="105" y="260" width="100" height="36" rx="14" stroke-width="1"/>
<text class="th" x="155" y="278" text-anchor="middle" dominant-baseline="central">Answer</text></g>

<g class="c-blue"><rect x="390" y="62" width="100" height="36" rx="4" stroke-width="0.5"/>
<text class="th" x="440" y="80" text-anchor="middle" dominant-baseline="central">Step 1</text></g>
<line x1="490" y1="80" x2="518" y2="80" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>

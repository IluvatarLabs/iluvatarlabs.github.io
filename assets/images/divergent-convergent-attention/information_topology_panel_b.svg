<g class="c-blue"><rect x="520" y="112" width="100" height="36" rx="4" stroke-width="0.5"/>
<text class="th" x="570" y="130" text-anchor="middle" dominant-baseline="central">Step 3</text></g>
<line x1="520" y1="130" x2="490" y2="130" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="390" y="112" width="100" height="36" rx="4" stroke-width="0.5"/>
<text class="th" x="440" y="130" text-anchor="middle" dominant-baseline="central">Step 4</text></g>
<path d="M390 130 L370 130 L370 180 L390 180" fill="none" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="390" y="162" width="100" height="36" rx="4" stroke-width="0.5"/>
<text class="th" x="440" y="180" text-anchor="middle" dominant-baseline="central">Step 5</text></g>
<line x1="490" y1="180" x2="518" y2="180" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="520" y="162" width="100" height="36" rx="14" stroke-width="0.5"/>
<text class="th" x="570" y="180" text-anchor="middle" dominant-baseline="central">Answer</text></g>

</svg>
title: Iluvatar Labs
description: Reality-inspired AI architectures for the AGI era
url: "https://iluvatarlabs.github.io"
baseurl: ""

# Author / org metadata used by jekyll-seo-tag for OG, Twitter, JSON-LD
author:
  name: Iluvatar Labs
  email: ben@iluvatarlabs.com
  url: "https://iluvatarlabs.github.io"
  twitter: IluvatarLabs

# Twitter / X card config. Per-post `image:` frontmatter triggers
# summary_large_image automatically; pages without an image get the
# fallback summary card.
twitter:
  username: IluvatarLabs
  card: summary_large_image

# Social profiles surfaced in JSON-LD sameAs.
social:
  name: Iluvatar Labs
  links:
    - "https://x.com/IluvatarLabs"
    - "https://www.linkedin.com/company/iluvatarlabs/"

# Logo for organization JSON-LD.
logo: /favicon.svg

# Build settings
future: true
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:title/
  projects:
    # IORI is held back from this launch. Flip to `output: true` and
    # restore iori/index.html when the IORI surface is ready to ship.
    output: false
    permalink: /iori/:name/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - CLAUDE.md
  - mockup-*.html
  - "index copy.html"
  - iori_mockups
  - IORI_exec.md
  - README.md
  - suggestions.md
  - package.json
  - package-lock.json
  - scripts
  - index-old-backup.html
  - "test-*.html"

# Default values
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Iluvatar Labs"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "iori-project"